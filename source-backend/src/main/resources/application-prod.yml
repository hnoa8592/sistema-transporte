spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10

  jpa:
    properties:
      hibernate:
        show_sql: false
        format_sql: false

logging:
  level:
    com.transporte: WARN
    root: ERROR

server:
  error:
    include-message: never
    include-stacktrace: never
